<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamify Profile</title>
    <link rel="stylesheet" href="../CSS/profile.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="logo">🎵 Jamify</div>
    <ul class="nav-links">
        <li><a href="../HTML/index.html">Home</a></li>
        <li><a href="../HTML/suggest.html">Suggest</a></li>
        <li><a href="../HTML/profile.html">Profile</a></li>
        <li><a href="../HTML/logout.html">Logout</a></li>
    </ul>
</nav>

<!-- Main content wrapper -->
<div class="main-content">

<!-- Profile Card -->
<div class="profile-card">
    <img src="../Images/album-profile-images/epic.png" class="profile-img">

    <div class="profile-info">
        <h2 id="displayName" class="editable-text" contenteditable="false"></h2>
        <p class="username" id="displayUsername"></p>
        <p class="bio" id="displayBio" class="editable-text" contenteditable="false"></p>

        <div class="stats">
            <span>2 Following</span>
            <span>1 Followers</span>
            <span>3 Reviews</span>
            <span>58 Likes</span>
            <span>⭐ 5.0 Avg Rating</span>
        </div>

        <div class="edit-buttons" id="editButtons" style="display: none;">
            <button id="saveBtn">Save</button>
            <button id="cancelBtn">Cancel</button>
        </div>
        <button id="editBtn">Edit Profile</button>
    </div>
</div>

<!-- Tabs -->
<div class="tabs">
    <button class="tab active" onclick="showTab('reviews')">Reviews</button>
    <button class="tab" onclick="showTab('following')">Following</button>
    <button class="tab" onclick="showTab('followers')">Followers</button>
</div>

<!-- Content -->
<div id="reviews" class="tab-content active">
    
    <!-- User Reviews Container -->
    <div id="user-reviews-container">
    <!-- Reviews will be loaded from localStorage -->
    </div>

</div>

<div id="following" class="tab-content">
    <div class="user-card">
        <img src="../Images/album-profile-images/epic.png" class="user-img">
        <div class="user-info">
            <h3>Reviewer</h3>
            <p class="username">@placeholder</p>
            <p class="bio">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        </div>
    </div>
</div>

<div id="followers" class="tab-content">
    <div class="user-card">
        <img src="../Images/album-profile-images/epic.png" class="user-img">
        <div class="user-info">
            <h3>Reviewer</h3>
            <p class="username">@placeholder</p>
            <p class="bio">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        </div>
    </div>
</div>
<script src="../JavaScript/profile.js"></script>
</div><!-- End main-content -->
</body>
</html>
