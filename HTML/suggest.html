<html>
<head>
  <title>Suggest Music</title>
  <link rel="stylesheet" href="../CSS/suggest.css" />
  <script src="../JavaScript/navbar.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="logo">🎵 Jamify</div>
    <ul class="nav-links">
        <li><a href="../HTML/index.html">Home</a></li>
        <li><a href="../HTML/suggest.html">Suggest</a></li>
        <li><a href="../HTML/profile.html">Profile</a></li>
        <li><a href="../HTML/logout.html">Logout</a></li>
    </ul>
  </nav>

  <div class="popup" id="popup">✅ Thank you for your suggestion!</div>

  <div class="container">

    <h1>Suggest Music</h1>
    <p class="subtitle">Know a song or album we're missing? Drop it here and we'll look into it.</p>

    <button class="btn-red" onclick="openForm()">♫ &nbsp; Submit a Suggestion</button>

    <div class="form-card" id="form-card">
      <h2>New Suggestion</h2>
      <div id="error-message" class="error-message" style="display: none;"></div>

      <div class="form-group">
        <label>Type *</label>
        <div class="radio-group">
          <label><input type="radio" name="type" value="album" checked onclick="changeType('album')" /> Album</label>
          <label><input type="radio" name="type" value="song" onclick="changeType('song')" /> Song</label>
        </div>
      </div>

      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="title" placeholder="Album title" />
      </div>

      <div class="form-group">
        <label>Artist *</label>
        <input type="text" id="artist" placeholder="Artist name" />
      </div>

      <div class="two-col">
        <div class="form-group">
          <label>Release Year</label>
          <input type="number" id="releaseYear" placeholder="e.g. 2023" min="1900" max="2099" />
        </div>
        <div class="form-group">
          <label>Genre</label>
          <input type="text" id="genre" placeholder="Pop, Jazz, Rock..." />
        </div>
      </div>

      <div class="form-group">
        <label id="link-label">Album Link</label>
        <input type="text" id="link-input" placeholder="e.g. Spotify, Anghami, SoundCloud" />
      </div>

      <div class="form-actions">
        <button class="btn-red" onclick="submitSuggestion()">Submit</button>
        <button class="btn-red" onclick="closeForm()">Cancel</button>
      </div>
    </div>

    <h2 class="suggestions-title">Your Suggestions</h2>

    <!-- This is where suggestions will appear -->
    <div id="suggestions-container"></div>

  </div>

  <script src="../JavaScript/suggest.js"></script>
</body>
</html>
