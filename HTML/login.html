<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamify Music Rating Website</title>
    
    <script src="../JavaScript/loginJS.js" defer></script>
    <link rel="stylesheet" href="../CSS/loginCSS.css">
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">Jamify</div>
        <div class="subtitle">Rate and review your favorite pop albums</div>
    </div>

    <div class="button-container">
        <button id="loginTab" class="active">Login</button>
        <button id="signupTab">Sign Up</button>
    </div>

    <div id="loginForm" class="form-box">
        <h3>Login</h3>
        <p class="form-desc">Enter your credentials to access your account</p>
        <div id="login-error-message" class="error-message" style="display: none;"></div>
        
        <label for="login-user">Username</label>
        <input type="text" id="login-user">
        
        <label for="login-pass">Password</label>
        <input type="password" id="login-pass">
        
        <button type="button" class="submit-btn" onclick="loginAction()">Login</button>
    </div>

    <div id="signupForm" class="form-box hidden">
        <h3>Sign Up</h3>
        <p class="form-desc">Create a new account to start reviewing music</p>
        <div id="signup-error-message" class="error-message" style="display: none;"></div>
        
        <label for="reg-name">Display Name</label>
        <input type="text" id="reg-name">
        
        <label for="reg-user">Username</label>
        <input type="text" id="reg-user">
        
        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email">

        <label for="phone">Phone Number (Optional)</label>
        <input type="tel" id="phone">

        <label for="reg-pass">Password</label>
        <input type="password" id="reg-pass" placeholder="At least 8 chars, 1 uppercase, 1 digit">
        
        <label for="reg-confirm">Confirm Password</label>
        <input type="password" id="reg-confirm">
        
        <button type="button" class="submit-btn" onclick="validateSignup()">Create Account</button>
    </div>
</div>


</body>
</html>
